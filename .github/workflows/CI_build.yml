name: CI_build

on: [push, pull_request]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - msys: MINGW32
            env: i686
            arch: i686
            configuration: Release
            compiler: gcc
          - msys: MINGW32
            env: i686
            arch: i686
            configuration: Debug
            compiler: gcc
          - msys: MINGW64
            env: x86_64
            arch: x86_64
            configuration: Release
            compiler: gcc
          - msys: MINGW64
            env: x86_64
            arch: x86_64
            configuration: Debug
            compiler: gcc
          - msys: CLANG64
            env: clang-x86_64
            arch: x86_64
            configuration: Release
            compiler: clang

    name: ${{ matrix.msys }} - ${{ matrix.configuration }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v7

    - name: Install and update MSYS2 tools
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys }}
        install: mingw-w64-${{ matrix.env }}-${{ matrix.compiler }} mingw-w64-${{ matrix.env }}-make
        update: true
        release: false

    - name: Make hlasm lexer N++ plugin
      working-directory: .\
      run: |
        Write-host "${{ matrix.msys }}"
        Write-host "${{ matrix.configuration }}"
        $Env:MSYSTEM = '${{ matrix.msys }}'
        $Env:Path = 'C:\msys64\usr\bin' + [IO.Path]::PathSeparator + $Env:Path
        $Env:Path = 'C:\msys64\' + '${{ matrix.msys }}'.ToLower() + '\bin' + [IO.Path]::PathSeparator + $Env:Path
        if ( $${{ matrix.configuration == 'Debug'}} ) {$Env:DEBUG = '1'}
        Write-Output "Tools version:"
        Write-Output (((${{ matrix.compiler }} --version) | select-object -first 1) + " " + (${{ matrix.compiler }} -dumpmachine))
        Write-Output (mingw32-make --version) | select-object -first 1
        Write-Output (sh --version) | select-object -first 1
        .\build.bat

    - uses: olegtarasov/get-tag@v2.1.4
      id: tagName

    - name: zip artifacts for ${{ matrix.env }}
      if: matrix.configuration == 'Release'
      run: 7z a HLASMLexer_${{ steps.tagName.outputs.tag }}_${{ matrix.env }}.zip .\bin\HLASMLexer.dll

    - name: Archive artifacts for ${{ matrix.msys }} / ${{ matrix.configuration }}
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: HLASMLexer_${{ steps.tagName.outputs.tag }}_${{ matrix.env }}.zip
          path: HLASMLexer_${{ steps.tagName.outputs.tag }}_${{ matrix.env }}.zip

    - name: Create release on tagging
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
          files: HLASMLexer_${{ steps.tagName.outputs.tag }}_${{ matrix.env }}.zip
